
<!-- ── login.html ── -->
{% extends "base.html" %}
{% block title %}Login — PlaceReady AI{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-80 py-5">
  <div class="auth-card card shadow-lg p-4" style="max-width:440px;width:100%;">
    <div class="text-center mb-4">
      <div class="auth-icon mb-3"><i class="fas fa-graduation-cap fa-3x text-primary"></i></div>
      <h3 class="fw-bold">Welcome Back</h3>
      <p class="text-muted small">Sign in to continue to PlaceReady AI</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <!-- Role Toggle -->
      <div class="d-flex gap-2 mb-3">
        <button type="button" class="btn btn-primary flex-fill role-btn active" data-role="student"
                onclick="setRole('student',this)">
          <i class="fas fa-user-graduate me-1"></i>Student
        </button>
        <button type="button" class="btn btn-outline-secondary flex-fill role-btn" data-role="admin"
                onclick="setRole('admin',this)">
          <i class="fas fa-shield-alt me-1"></i>Admin
        </button>
      </div>
      <input type="hidden" name="role" id="roleInput" value="student"/>

      <div class="mb-3">
        <label class="form-label fw-500">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-500">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" id="pwdField" class="form-control" placeholder="••••••••" required/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <hr class="my-3"/>
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="text-primary fw-500">Register here</a>
    </p>
  </div>
</div>

<script>
function setRole(role, btn) {
  document.getElementById('roleInput').value = role;
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.remove('btn-primary','btn-secondary');
    b.classList.add('btn-outline-secondary');
  });
  btn.classList.remove('btn-outline-secondary');
  btn.classList.add('btn-primary');
}
function togglePwd() {
  const f = document.getElementById('pwdField');
  const e = document.getElementById('eyeIcon');
  f.type = f.type === 'password' ? 'text' : 'password';
  e.classList.toggle('fa-eye'); e.classList.toggle('fa-eye-slash');
}
</script>
{% endblock %}
