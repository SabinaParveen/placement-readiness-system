{% extends "base.html" %}
{% block title %}Register — PlaceReady AI{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-80 py-5">
  <div class="auth-card card shadow-lg p-4" style="max-width:480px;width:100%;">
    <div class="text-center mb-4">
      <div class="auth-icon mb-3"><i class="fas fa-user-plus fa-3x text-primary"></i></div>
      <h3 class="fw-bold">Create Account</h3>
      <p class="text-muted small">Join PlaceReady AI to assess your placement readiness</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-500">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="full_name" class="form-control" placeholder="Your Full Name" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-500">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-500">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-500">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>
    <hr class="my-3"/>
    <p class="text-center text-muted small mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-primary fw-500">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
