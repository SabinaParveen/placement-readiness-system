{% extends "base.html" %}
{% block title %}Profile — PlaceReady AI{% endblock %}

{% block content %}
<div class="container py-4 profile-section">
  <div class="card p-4 shadow">
    <h5 class="fw-bold mb-4"><i class="fas fa-user-edit me-2 text-primary"></i>Academic Profile</h5>

    <form method="POST" action="{{ url_for('student.profile') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div class="row g-3">
        <!-- Department -->
        <div class="col-md-6">
          <label class="form-label fw-500">Department <span class="text-danger">*</span></label>
          <select name="department" class="form-select" required>
            <option value="">Select Department</option>
            {% for dept in ['CSE','IT','ECE','EEE','MECH','CIVIL','AIDS','AIML','CYBER SECURITY','MCA','MBA'] %}
            <option value="{{ dept }}" {% if student.department == dept %}selected{% endif %}>{{ dept }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- CGPA -->
        <div class="col-md-6">
          <label class="form-label fw-500">CGPA (0 – 10) <span class="text-danger">*</span></label>
          <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10"
                 placeholder="e.g. 8.5" value="{{ student.cgpa or '' }}" required/>
        </div>

        <!-- Attendance -->
        <div class="col-md-6">
          <label class="form-label fw-500">Attendance % <span class="text-danger">*</span></label>
          <input type="number" name="attendance" class="form-control" step="0.1" min="0" max="100"
                 placeholder="e.g. 85" value="{{ student.attendance or '' }}" required/>
        </div>

        <!-- Internships -->
        <div class="col-md-6">
          <label class="form-label fw-500">Internships Completed</label>
          <input type="number" name="internships" class="form-control" min="0" max="20"
                 placeholder="0" value="{{ student.internships or 0 }}"/>
        </div>

        <!-- Projects -->
        <div class="col-md-6">
          <label class="form-label fw-500">Projects Completed</label>
          <input type="number" name="projects" class="form-control" min="0" max="50"
                 placeholder="0" value="{{ student.projects or 0 }}"/>
        </div>

        <!-- Certifications -->
        <div class="col-md-6">
          <label class="form-label fw-500">Certifications Earned</label>
          <input type="number" name="certifications" class="form-control" min="0" max="30"
                 placeholder="0" value="{{ student.certifications or 0 }}"/>
        </div>
      </div>

      <div class="mt-4 d-flex gap-3">
        <button type="submit" class="btn btn-primary px-4">
          <i class="fas fa-save me-2"></i>Save Profile
        </button>
        <a href="{{ url_for('student.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
